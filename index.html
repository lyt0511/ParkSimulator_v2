<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ParkSimulator v2 - Slice s01+s02+s03+s04+s05</title>
    <style>
      :root {
        --bg: #eef2f6;
        --card: #ffffff;
        --text: #1f2d3d;
        --muted: #5f6b7a;
        --brand: #2b6cb0;
        --ok: #1f8f4e;
        --warn: #c05621;
        --border: #d5dde6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background: linear-gradient(180deg, #f8fafc, var(--bg));
        color: var(--text);
      }

      .page {
        max-width: 1100px;
        margin: 0 auto;
        padding: 20px;
        display: grid;
        gap: 16px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 20px;
      }

      .sub {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
      }

      .layout {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 16px;
      }

      @media (max-width: 900px) {
        .layout {
          grid-template-columns: 1fr;
        }
      }

      .canvas-wrap {
        display: grid;
        gap: 8px;
      }

      canvas {
        width: 100%;
        max-width: 720px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: #fff;
      }

      .toolbar,
      .controls,
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }

      button,
      select,
      input[type="number"],
      input[type="range"] {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 13px;
        background: #fff;
      }

      button {
        cursor: pointer;
      }

      button.primary {
        background: var(--brand);
        color: #fff;
        border-color: var(--brand);
      }

      button.warn {
        background: #fff7ed;
        color: var(--warn);
      }

      .hud {
        font-family: "Consolas", "Courier New", monospace;
        font-size: 12px;
        line-height: 1.5;
        white-space: pre-wrap;
        background: #f7fafc;
        border: 1px dashed var(--border);
        border-radius: 8px;
        padding: 10px;
      }

      .ok {
        color: var(--ok);
      }
    </style>
  </head>
  <body>
    <div class="page">
      <section class="card">
        <h1>停车模拟器 Slice s01+s02+s03+s04+s05</h1>
        <p class="sub">
          合并切片01~05：支持四场景循环练习，具备可区分渲染、可控驾驶、真实结算，以及风险锁存与超时自动结束。
        </p>
      </section>

      <section class="layout">
        <div class="card canvas-wrap">
          <div class="toolbar">
            <label for="scenario">场景</label>
            <select id="scenario">
              <option value="normal-reverse-parking">normal-reverse-parking</option>
              <option value="normal-parallel-parking">normal-parallel-parking</option>
              <option value="narrow-reverse-parking">narrow-reverse-parking</option>
              <option value="narrow-parallel-parking">narrow-parallel-parking</option>
            </select>
            <button id="loadScene" class="primary">选择并加载场景</button>
            <button id="resetCar">重置车辆位置</button>
          </div>
          <canvas id="sceneCanvas" width="720" height="420"></canvas>
          <small class="sub">
            键盘：←/→ 控方向，↑/↓ 控油门，Space 结束；HUD 中可查看 `latchedRisks`（风险锁存）与 `elapsedTicks`（超时计数）。
          </small>
        </div>

        <div class="card">
          <div class="row">
            <strong>控制台</strong>
          </div>
          <div class="controls" style="margin-top: 10px">
            <button data-direction="left">左转</button>
            <button data-direction="straight">直行</button>
            <button data-direction="right">右转</button>
          </div>
          <div class="row" style="margin-top: 10px">
            <label for="throttleRange">油门</label>
            <input id="throttleRange" type="range" min="-1" max="1" step="0.001" value="0.5" />
            <input id="throttleValue" type="number" min="-1" max="1" step="0.001" value="0.5" />
          </div>
          <div class="row" style="margin-top: 10px">
            <button id="finishBtn" class="warn">结束会话</button>
            <button id="retryBtn">重试</button>
            <button id="backBtn">返回场景选择</button>
          </div>

          <div style="margin-top: 12px">
            <strong>实时状态</strong>
            <div id="hud" class="hud"></div>
          </div>
          <div style="margin-top: 8px">
            <strong>结果</strong>
            <div id="resultText" class="hud"></div>
          </div>
        </div>
      </section>
    </div>
    <script type="module" src="./src/web-app.js"></script>
  </body>
</html>
